<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RE GEN vial</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1024px;
      height: 1024px;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background:
        radial-gradient(ellipse 80% 60% at 75% 70%, rgba(230, 0, 126, 0.35), transparent 55%),
        radial-gradient(ellipse 50% 40% at 15% 25%, rgba(120, 40, 160, 0.25), transparent 50%),
        linear-gradient(160deg, #0a0610 0%, #1a0f1f 45%, #0d0a12 100%);
    }
    .molecule {
      position: absolute;
      right: 48px;
      top: 180px;
      width: 280px;
      height: 280px;
      opacity: 0.55;
      filter: drop-shadow(0 0 24px rgba(230, 0, 126, 0.45));
    }
    .dna {
      position: absolute;
      left: 24px;
      top: 120px;
      width: 120px;
      height: 360px;
      opacity: 0.2;
    }
    .scene {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 72px;
    }
    .vial-wrap {
      position: relative;
      width: 340px;
      height: 620px;
      filter: drop-shadow(0 28px 48px rgba(0, 0, 0, 0.55));
    }
    .cap {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 118px;
      height: 44px;
      border-radius: 10px 10px 4px 4px;
      background: linear-gradient(180deg, #ff4da6 0%, #e6007e 55%, #b80062 100%);
      box-shadow: inset 0 2px 4px rgba(255,255,255,.35);
    }
    .seal {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 128px;
      height: 18px;
      border-radius: 2px;
      background: linear-gradient(180deg, #e8e8ec, #9a9aa8 50%, #c8c8d0);
    }
    .glass {
      position: absolute;
      top: 54px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 520px;
      border-radius: 8px 8px 14px 14px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.12) 0%, transparent 22%, transparent 78%, rgba(255,255,255,.08) 100%),
        linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(200,180,220,.04) 40%, rgba(80,40,100,.12) 100%);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: inset -8px 0 20px rgba(0,0,0,.15), inset 8px 0 16px rgba(255,255,255,.06);
    }
    .liquid {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      height: 28%;
      border-radius: 0 0 10px 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.15), rgba(230,0,126,.08));
    }
    .label {
      position: absolute;
      top: 200px;
      left: 50%;
      transform: translateX(-50%);
      width: 176px;
      min-height: 220px;
      background: #0a0a0a;
      border-radius: 4px;
      padding: 18px 14px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
      text-align: center;
    }
    .logo-re { color: #e6007e; font-weight: 900; font-size: 22px; letter-spacing: -0.02em; display: inline; }
    .logo-gen { color: #d8d8de; font-weight: 900; font-size: 22px; letter-spacing: -0.02em; display: inline; }
    .product {
      margin-top: 14px;
      color: #f0f0f4;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1.1;
      word-break: break-word;
    }
    .category {
      margin-top: 10px;
      color: #e6007e;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .line {
      margin: 8px auto 0;
      width: 72%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #e6007e, #ff4da6, #e6007e, transparent);
      box-shadow: 0 0 8px rgba(230,0,126,.6);
    }
    .usage {
      margin-top: 12px;
      color: rgba(255,255,255,.75);
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.5;
    }
    .dose {
      margin-top: 14px;
      color: #e6007e;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }
    .reflect {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) scaleY(-1);
      width: 340px;
      height: 120px;
      opacity: 0.18;
      mask-image: linear-gradient(180deg, black, transparent);
      pointer-events: none;
    }
    .jar .glass { border-radius: 12px; height: 280px; top: 120px; width: 220px; }
    .jar .label { top: 160px; }
    .spray .glass { width: 120px; height: 280px; top: 140px; border-radius: 20px; }
    .spray .label { top: 180px; width: 160px; }
    .bottle .glass { width: 160px; height: 320px; top: 120px; border-radius: 12px 12px 20px 20px; }
    .bottle .label { top: 170px; }
  </style>
</head>
<body>
  <svg class="dna" viewBox="0 0 80 200" fill="none">
    <path d="M40 10 Q55 40 40 70 Q25 100 40 130 Q55 160 40 190" stroke="#e6007e" stroke-width="2" opacity=".5"/>
    <path d="M40 10 Q25 40 40 70 Q55 100 40 130 Q25 160 40 190" stroke="#ff4da6" stroke-width="2" opacity=".35"/>
  </svg>
  <svg class="molecule" viewBox="0 0 200 200">
    <circle cx="100" cy="40" r="14" fill="#e6007e" opacity=".85"/>
    <circle cx="160" cy="90" r="12" fill="#ff4da6" opacity=".75"/>
    <circle cx="130" cy="160" r="13" fill="#e6007e" opacity=".8"/>
    <circle cx="50" cy="130" r="11" fill="#ff4da6" opacity=".7"/>
    <line x1="100" y1="40" x2="160" y2="90" stroke="rgba(255,255,255,.35)" stroke-width="2"/>
    <line x1="160" y1="90" x2="130" y2="160" stroke="rgba(255,255,255,.35)" stroke-width="2"/>
    <line x1="130" y1="160" x2="50" y2="130" stroke="rgba(255,255,255,.35)" stroke-width="2"/>
    <line x1="50" y1="130" x2="100" y2="40" stroke="rgba(255,255,255,.35)" stroke-width="2"/>
  </svg>
  <div class="scene">
    <div class="vial-wrap" id="vial">
      <div class="cap"></div>
      <div class="seal"></div>
      <div class="glass"><div class="liquid"></div></div>
      <div class="label">
        <div><span class="logo-re">RE</span><span class="logo-gen">GEN</span></div>
        <div class="product" id="name">BPC-157</div>
        <div class="category" id="category">PEPTIDE SUPPORT</div>
        <div class="line"></div>
        <div class="usage" id="usage">Sterile<br>For Subcutaneous Use</div>
        <div class="dose" id="dose">5 mg</div>
      </div>
      <div class="reflect" id="reflect"></div>
    </div>
  </div>
  <script>
    window.setVial = ({ name, category, dose, usage, form }) => {
      document.getElementById('name').textContent = name;
      document.getElementById('category').textContent = category;
      document.getElementById('dose').textContent = dose;
      document.getElementById('usage').innerHTML = (usage || []).join('<br>');
      const vial = document.getElementById('vial');
      vial.className = 'vial-wrap' + (form ? ' ' + form : '');
      document.getElementById('reflect').innerHTML = vial.innerHTML;
    };
  </script>
</body>
</html>
