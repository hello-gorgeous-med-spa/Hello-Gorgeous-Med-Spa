  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"eae49961-85af-4c82-8d26-42bcce7e5039\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"303c23d1-ed5c-4953-8aec-25ae6f3473c4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* ============================================================\n   HELLO GORGEOUS — COLOR TOKENS\n   Brand law: White, Black, Hot Pink. No gray on the public site.\n   ============================================================ */\n\n:root {\n  /* ---- Core brand ---- */\n  --hg-white: #FFFFFF;\n  --hg-black: #000000;\n  --hg-pink: #FF2D8E;        /* primary hot pink (UI, accents, CTAs) */\n  --hg-pink-deep: #E6007E;   /* deeper pink (hover, gradients, logo) */\n  --hg-pink-wine: #C90A68;   /* darkest pink (pressed, deep accents) */\n\n  /* ---- Brand pink scale ---- */\n  --hg-pink-50:  #FFF0F7;\n  --hg-pink-100: #FFE0F0;\n  --hg-pink-200: #FFC1E2;\n  --hg-pink-300: #FF92CC;\n  --hg-pink-400: #FF5FB1;\n  --hg-pink-500: #FF2D8E;\n  --hg-pink-600: #E6007E;\n  --hg-pink-700: #C90A68;\n  --hg-pink-800: #9B0B52;\n  --hg-pink-900: #730A3F;\n  --hg-pink-950: #4B062A;\n\n  /* Soft pink tints for backgrounds / surfaces */\n  --hg-pink-soft: #FFF5F9;   /* near-white pink wash */\n  --hg-pink-mid:  #FCE7F3;   /* light pink panel */\n  --hg-pink-light: #FFB8DC;  /* light pink text on black (footer credential) */\n\n  /* ---- Accent metals ---- */\n  --hg-gold: #FFD700;        /* award / \"Best of Oswego\" */\n  --hg-gold-soft: #FFD86B;\n\n  /* ---- Trifecta accent set (homepage showcase, nav pills, app) ----\n     A three-way accent system layered on the brand. Use for tech\n     showcases (Morpheus8 + Quantum RF + Solaria CO2) and nav rhythm. */\n  --tri-pink: #ec4899;\n  --tri-pink-deep: #db2777;\n  --tri-pink-subtitle: #f472b6;\n  --tri-blue: #3b82f6;\n  --tri-blue-deep: #6366f1;\n  --tri-blue-subtitle: #60a5fa;\n  --tri-amber: #f59e0b;\n  --tri-amber-deep: #f97316;\n  --tri-amber-subtitle: #fbbf24;\n  --tri-gradient-title: linear-gradient(to right, #ec4899, #60a5fa, #f59e0b);  /* @kind color */\n  --tri-glass: rgba(24, 24, 27, 0.85);\n  --tri-glass-soft: rgba(24, 24, 27, 0.6);\n  --tri-panel: #18181b;\n\n  /* ---- Clinical palette (admin / charting only — NOT public) ---- */\n  --clinical-navy: #002168;\n  --clinical-navy-light: #1e3a5f;\n  --clinical-blue: #2D63A4;\n  --clinical-blue-light: #5E94C2;\n  --clinical-ink: #111827;\n  --clinical-ink-soft: #374151;\n\n  /* ---- Semantic status ---- */\n  --hg-success: #16a34a;\n  --hg-warning: #f59e0b;\n  --hg-error: #dc2626;\n\n  /* ============================================================\n     SEMANTIC ALIASES — prefer these in components\n     ============================================================ */\n\n  /* Surfaces */\n  --surface-page: var(--hg-white);\n  --surface-card: var(--hg-white);\n  --surface-inverse: var(--hg-black);     /* black header / footer */\n  --surface-pink: var(--hg-pink);\n  --surface-pink-wash: var(--hg-pink-soft);\n  --surface-glass: var(--tri-glass);\n\n  /* Text */\n  --text-strong: var(--hg-black);\n  --text-body: var(--hg-black);\n  --text-on-dark: var(--hg-white);\n  --text-on-pink: var(--hg-white);\n  --text-accent: var(--hg-pink);\n  --text-muted-on-dark: rgba(255, 255, 255, 0.55);\n\n  /* Borders */\n  --border-strong: var(--hg-black);       /* 2px black card outline */\n  --border-accent: var(--hg-pink);\n  --border-hairline: rgba(0, 0, 0, 0.1);\n  --border-on-dark: rgba(255, 255, 255, 0.12);\n\n  /* Interactive */\n  --action-primary: var(--hg-pink);\n  --action-primary-hover: var(--hg-pink-deep);\n  --action-primary-text: var(--hg-white);\n  --focus-ring: var(--hg-pink);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   HELLO GORGEOUS — TYPOGRAPHY TOKENS\n   Playfair Display (serif display) + Inter (sans body).\n   Montserrat is used only by the embedded Cherry financing widget.\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-serif: \"Playfair Display\", Georgia, \"Times New Roman\", serif;\n  --font-sans: \"Inter\", system-ui, -apple-system, \"Segoe UI\", sans-serif;\n  --font-display: var(--font-serif);  /* headings */\n  --font-body: var(--font-sans);      /* paragraphs, UI */\n\n  /* ---- Weights ---- */\n  --fw-regular: 400;   /* @kind other */\n  --fw-medium: 500;    /* @kind other */\n  --fw-semibold: 600;  /* @kind other */\n  --fw-bold: 700;      /* @kind other */\n\n  /* ---- Type scale (desktop) ---- */\n  --fs-display: 56px;   /* hero h1 */\n  --fs-h1: 52px;\n  --fs-h2: 38px;\n  --fs-h3: 28px;\n  --fs-h4: 22px;\n  --fs-lead: 20px;      /* lead paragraph */\n  --fs-body: 18px;      /* body copy */\n  --fs-sm: 16px;\n  --fs-xs: 13px;\n  --fs-eyebrow: 11px;   /* uppercase eyebrow / kicker */\n\n  /* ---- Line heights ---- */\n  --lh-display: 1.1;  /* @kind other */\n  --lh-heading: 1.2;  /* @kind other */\n  --lh-body: 1.7;     /* @kind other */\n  --lh-snug: 1.3;     /* @kind other */\n\n  /* ---- Letter spacing ---- */\n  --ls-display: -0.02em;   /* @kind other */\n  --ls-tight: -0.01em;     /* @kind other */\n  --ls-normal: 0;          /* @kind other */\n  --ls-wide: 0.05em;       /* @kind other */\n  --ls-widest: 0.2em;      /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   HELLO GORGEOUS — SPACING, RADII, SHADOWS, LAYOUT\n   Generous \"luxury\" spacing: 100px major sections.\n   ============================================================ */\n\n:root {\n  /* ---- Spacing scale ---- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 40px;\n  --space-8: 60px;\n  --space-9: 80px;\n  --space-10: 100px;\n  --space-11: 120px;\n\n  /* ---- Semantic spacing ---- */\n  --section-y: 100px;        /* major vertical section padding */\n  --section-y-lg: 120px;\n  --section-y-sm: 60px;\n  --section-x: 24px;         /* page gutter */\n  --card-gap: 40px;          /* grid gap between cards */\n  --card-pad: 32px;          /* inner card padding */\n\n  /* ---- Radii ---- */\n  --radius-sm: 8px;          /* buttons, inputs */\n  --radius-md: 12px;         /* small cards, dropdowns */\n  --radius-lg: 16px;         /* cards (xl) */\n  --radius-xl: 22px;         /* large feature cards (2xl) */\n  --radius-pill: 999px;      /* badges, nav pills */\n\n  /* ---- Shadows ---- */\n  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.08);\n  --shadow-card-hover: 0 20px 40px rgba(0, 0, 0, 0.1);\n  --shadow-glow: 0 0 0 1px rgba(255, 45, 142, 0.2), 0 18px 55px rgba(255, 45, 142, 0.18);\n  --shadow-clinical: 0 1px 3px rgba(0, 0, 0, 0.06), 0 4px 12px rgba(0, 0, 0, 0.04);\n  --shadow-pink: 0 10px 30px rgba(255, 45, 142, 0.25);\n\n  /* ---- Layout ---- */\n  --container-max: 1280px;\n  --container-wide: 1440px;\n\n  /* ---- Motion ---- */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);  /* @kind other */\n  --dur-fast: 0.2s;   /* @kind other */\n  --dur-base: 0.3s;   /* @kind other */\n  --dur-slow: 0.6s;   /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   HELLO GORGEOUS — BASE & HELPER STYLES\n   Brand-law contrast system, typography defaults, and the\n   button / card / section helpers used across the marketing site.\n   ============================================================ */\n\n*,\n*::before,\n*::after {\n  box-sizing: border-box;\n}\n\nbody {\n  margin: 0;\n  background: var(--surface-page);\n  color: var(--text-body);\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n::selection {\n  background: rgba(255, 45, 142, 0.3);\n  color: var(--hg-black);\n}\n\n/* ---- Headings: Playfair serif ---- */\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-heading);\n  margin: 0 0 0.5em;\n  color: var(--text-strong);\n}\n\nh1 { font-size: clamp(2.5rem, 6vw, 3.5rem); line-height: var(--lh-display); letter-spacing: var(--ls-display); }\nh2 { font-size: clamp(1.75rem, 4vw, 2.5rem); }\nh3 { font-size: clamp(1.25rem, 3vw, 1.75rem); font-weight: var(--fw-semibold); }\nh4 { font-size: var(--fs-h4); font-weight: var(--fw-semibold); }\n\np { margin: 0 0 1em; }\n\na { color: inherit; }\n\n/* ---- Eyebrow / kicker ---- */\n.hg-eyebrow {\n  font-family: var(--font-body);\n  font-size: var(--fs-eyebrow);\n  font-weight: var(--fw-bold);\n  text-transform: uppercase;\n  letter-spacing: var(--ls-widest);\n  color: var(--text-accent);\n}\n\n/* ============================================================\n   SECTION COLOR CONTROL\n   ============================================================ */\n.section-white { background: var(--hg-white); color: var(--hg-black); }\n.section-black { background: var(--hg-black); color: var(--hg-white); }\n.section-pink  { background: var(--hg-pink);  color: var(--hg-white); }\n.section-white *, .section-black *, .section-pink * { color: inherit; }\n.section-white .accent, .section-black .accent { color: var(--hg-pink); }\n\n/* ============================================================\n   LAYOUT HELPERS\n   ============================================================ */\n.hg-container {\n  max-width: var(--container-max);\n  margin: 0 auto;\n  padding-left: var(--section-x);\n  padding-right: var(--section-x);\n}\n.section-padding    { padding: var(--section-y) var(--section-x); }\n.section-padding-lg { padding: var(--section-y-lg) var(--section-x); }\n.section-padding-sm { padding: var(--section-y-sm) var(--section-x); }\n\n/* ============================================================\n   BUTTON SYSTEM\n   ============================================================ */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 8px;\n  min-height: 48px;\n  padding: 16px 36px;\n  border: none;\n  border-radius: var(--radius-sm);\n  font-family: var(--font-body);\n  font-weight: var(--fw-semibold);\n  font-size: var(--fs-sm);\n  cursor: pointer;\n  transition: all var(--dur-base) var(--ease-out);\n  text-decoration: none;\n}\n.btn:hover { transform: translateY(-2px); }\n\n.btn-primary { background: var(--hg-pink); color: #fff; }\n.btn-primary:hover { background: var(--hg-black); color: var(--hg-pink); box-shadow: var(--shadow-card-hover); }\n\n.btn-secondary { background: var(--hg-black); color: #fff; border: 2px solid var(--hg-black); }\n.btn-secondary:hover { background: #fff; color: var(--hg-black); box-shadow: var(--shadow-card-hover); }\n\n.btn-outline { background: transparent; color: var(--hg-black); border: 2px solid var(--hg-black); }\n.btn-outline:hover { background: var(--hg-pink); color: #fff; border-color: var(--hg-pink); }\n\n.btn-white { background: #fff; color: var(--hg-black); }\n.btn-white:hover { background: var(--hg-black); color: #fff; }\n\n/* Premium \"CTA\" variant: uppercase, wide tracking */\n.btn-cta {\n  text-transform: uppercase;\n  letter-spacing: var(--ls-widest);\n  font-size: var(--fs-xs);\n}\n\n/* Trifecta gradient button */\n.btn-gradient {\n  background: linear-gradient(to right, var(--tri-pink), var(--tri-pink-deep));\n  color: #fff;\n}\n.btn-gradient:hover { filter: brightness(1.1); }\n\n/* ============================================================\n   CARD SYSTEM\n   ============================================================ */\n.hg-card {\n  background: var(--surface-card);\n  color: var(--hg-black);\n  border: 2px solid var(--hg-black);\n  border-radius: var(--radius-lg);\n  padding: var(--card-pad);\n  transition: all var(--dur-base) var(--ease-out);\n}\n.hg-card:hover {\n  border-color: var(--hg-pink);\n  transform: translateY(-4px);\n  box-shadow: var(--shadow-card-hover);\n}\n.hg-card .accent { color: var(--hg-pink); }\n\n/* Soft card (shadow instead of hard border) */\n.hg-card-soft {\n  background: #fff;\n  border: 1px solid var(--border-hairline);\n  border-radius: var(--radius-lg);\n  padding: var(--card-pad);\n  box-shadow: var(--shadow-card);\n}\n\n/* ============================================================\n   BADGE / PILL\n   ============================================================ */\n.hg-badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  padding: 4px 10px;\n  border-radius: var(--radius-pill);\n  background: var(--hg-pink-deep);\n  color: #fff;\n  font-size: 9px;\n  font-weight: var(--fw-bold);\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n}\n\n/* ============================================================\n   DIVIDERS\n   ============================================================ */\n.divider-gradient {\n  width: 100%;\n  height: 4px;\n  background: linear-gradient(90deg, transparent, var(--hg-pink), transparent);\n}\n\n/* ============================================================\n   MOTION\n   ============================================================ */\n.fade-up { opacity: 0; transform: translateY(24px); }\n.fade-up.is-visible {\n  opacity: 1;\n  transform: translateY(0);\n  transition: opacity var(--dur-slow) var(--ease-out), transform var(--dur-slow) var(--ease-out);\n}\n@media (prefers-reduced-motion: reduce) at('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"eae49961-85af-4c82-8d26-42bcce7e5039\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"303c23d1-ed5c-4953-8aec-25ae6f3473c4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   HELLO GORGEOUS — COLOR TOKENS\n   Brand law: White, Black, Hot Pink. No gray on the public site.\n   ============================================================ */\n\n:root {\n  /* ---- Core brand ---- */\n  --hg-white: #FFFFFF;\n  --hg-black: #000000;\n  --hg-pink: #FF2D8E;        /* primary hot pink (UI, accents, CTAs) */\n  --hg-pink-deep: #E6007E;   /* deeper pink (hover, gradients, logo) */\n  --hg-pink-wine: #C90A68;   /* darkest pink (pressed, deep accents) */\n\n  /* ---- Brand pink scale ---- */\n  --hg-pink-50:  #FFF0F7;\n  --hg-pink-100: #FFE0F0;\n  --hg-pink-200: #FFC1E2;\n  --hg-pink-300: #FF92CC;\n  --hg-pink-400: #FF5FB1;\n  --hg-pink-500: #FF2D8E;\n  --hg-pink-600: #E6007E;\n  --hg-pink-700: #C90A68;\n  --hg-pink-800: #9B0B52;\n  --hg-pink-900: #730A3F;\n  --hg-pink-950: #4B062A;\n\n  /* Soft pink tints for backgrounds / surfaces */\n  --hg-pink-soft: #FFF5F9;   /* near-white pink wash */\n  --hg-pink-mid:  #FCE7F3;   /* light pink panel */\n  --hg-pink-light: #FFB8DC;  /* light pink text on black (footer credential) */\n\n  /* ---- Accent metals ---- */\n  --hg-gold: #FFD700;        /* award / \"Best of Oswego\" */\n  --hg-gold-soft: #FFD86B;\n\n  /* ---- Trifecta accent set (homepage showcase, nav pills, app) ----\n     A three-way accent system layered on the brand. Use for tech\n     showcases (Morpheus8 + Quantum RF + Solaria CO2) and nav rhythm. */\n  --tri-pink: #ec4899;\n  --tri-pink-deep: #db2777;\n  --tri-pink-subtitle: #f472b6;\n  --tri-blue: #3b82f6;\n  --tri-blue-deep: #6366f1;\n  --tri-blue-subtitle: #60a5fa;\n  --tri-amber: #f59e0b;\n  --tri-amber-deep: #f97316;\n  --tri-amber-subtitle: #fbbf24;\n  --tri-gradient-title: linear-gradient(to right, #ec4899, #60a5fa, #f59e0b);  /* @kind color */\n  --tri-glass: rgba(24, 24, 27, 0.85);\n  --tri-glass-soft: rgba(24, 24, 27, 0.6);\n  --tri-panel: #18181b;\n\n  /* ---- Clinical palette (admin / charting only — NOT public) ---- */\n  --clinical-navy: #002168;\n  --clinical-navy-light: #1e3a5f;\n  --clinical-blue: #2D63A4;\n  --clinical-blue-light: #5E94C2;\n  --clinical-ink: #111827;\n  --clinical-ink-soft: #374151;\n\n  /* ---- Semantic status ---- */\n  --hg-success: #16a34a;\n  --hg-warning: #f59e0b;\n  --hg-error: #dc2626;\n\n  /* ============================================================\n     SEMANTIC ALIASES — prefer these in components\n     ============================================================ */\n\n  /* Surfaces */\n  --surface-page: var(--hg-white);\n  --surface-card: var(--hg-white);\n  --surface-inverse: var(--hg-black);     /* black header / footer */\n  --surface-pink: var(--hg-pink);\n  --surface-pink-wash: var(--hg-pink-soft);\n  --surface-glass: var(--tri-glass);\n\n  /* Text */\n  --text-strong: var(--hg-black);\n  --text-body: var(--hg-black);\n  --text-on-dark: var(--hg-white);\n  --text-on-pink: var(--hg-white);\n  --text-accent: var(--hg-pink);\n  --text-muted-on-dark: rgba(255, 255, 255, 0.55);\n\n  /* Borders */\n  --border-strong: var(--hg-black);       /* 2px black card outline */\n  --border-accent: var(--hg-pink);\n  --border-hairline: rgba(0, 0, 0, 0.1);\n  --border-on-dark: rgba(255, 255, 255, 0.12);\n\n  /* Interactive */\n  --action-primary: var(--hg-pink);\n  --action-primary-hover: var(--hg-pink-deep);\n  --action-primary-text: var(--hg-white);\n  --focus-ring: var(--hg-pink);\n}\n\n/* ============================================================\n   HELLO GORGEOUS — TYPOGRAPHY TOKENS\n   Playfair Display (serif display) + Inter (sans body).\n   Montserrat is used only by the embedded Cherry financing widget.\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-serif: \"Playfair Display\", Georgia, \"Times New Roman\", serif;\n  --font-sans: \"Inter\", system-ui, -apple-system, \"Segoe UI\", sans-serif;\n  --font-display: var(--font-serif);  /* headings */\n  --font-body: var(--font-sans);      /* paragraphs, UI */\n\n  /* ---- Weights ---- */\n  --fw-regular: 400;   /* @kind other */\n  --fw-medium: 500;    /* @kind other */\n  --fw-semibold: 600;  /* @kind other */\n  --fw-bold: 700;      /* @kind other */\n\n  /* ---- Type scale (desktop) ---- */\n  --fs-display: 56px;   /* hero h1 */\n  --fs-h1: 52px;\n  --fs-h2: 38px;\n  --fs-h3: 28px;\n  --fs-h4: 22px;\n  --fs-lead: 20px;      /* lead paragraph */\n  --fs-body: 18px;      /* body copy */\n  --fs-sm: 16px;\n  --fs-xs: 13px;\n  --fs-eyebrow: 11px;   /* uppercase eyebrow / kicker */\n\n  /* ---- Line heights ---- */\n  --lh-display: 1.1;  /* @kind other */\n  --lh-heading: 1.2;  /* @kind other */\n  --lh-body: 1.7;     /* @kind other */\n  --lh-snug: 1.3;     /* @kind other */\n\n  /* ---- Letter spacing ---- */\n  --ls-display: -0.02em;   /* @kind other */\n  --ls-tight: -0.01em;     /* @kind other */\n  --ls-normal: 0;          /* @kind other */\n  --ls-wide: 0.05em;       /* @kind other */\n  --ls-widest: 0.2em;      /* @kind other */\n}\n\n/* ============================================================\n   HELLO GORGEOUS — SPACING, RADII, SHADOWS, LAYOUT\n   Generous \"luxury\" spacing: 100px major sections.\n   ============================================================ */\n\n:root {\n  /* ---- Spacing scale ---- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 40px;\n  --space-8: 60px;\n  --space-9: 80px;\n  --space-10: 100px;\n  --space-11: 120px;\n\n  /* ---- Semantic spacing ---- */\n  --section-y: 100px;        /* major vertical section padding */\n  --section-y-lg: 120px;\n  --section-y-sm: 60px;\n  --section-x: 24px;         /* page gutter */\n  --card-gap: 40px;          /* grid gap between cards */\n  --card-pad: 32px;          /* inner card padding */\n\n  /* ---- Radii ---- */\n  --radius-sm: 8px;          /* buttons, inputs */\n  --radius-md: 12px;         /* small cards, dropdowns */\n  --radius-lg: 16px;         /* cards (xl) */\n  --radius-xl: 22px;         /* large feature cards (2xl) */\n  --radius-pill: 999px;      /* badges, nav pills */\n\n  /* ---- Shadows ---- */\n  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.08);\n  --shadow-card-hover: 0 20px 40px rgba(0, 0, 0, 0.1);\n  --shadow-glow: 0 0 0 1px rgba(255, 45, 142, 0.2), 0 18px 55px rgba(255, 45, 142, 0.18);\n  --shadow-clinical: 0 1px 3px rgba(0, 0, 0, 0.06), 0 4px 12px rgba(0, 0, 0, 0.04);\n  --shadow-pink: 0 10px 30px rgba(255, 45, 142, 0.25);\n\n  /* ---- Layout ---- */\n  --container-max: 1280px;\n  --container-wide: 1440px;\n\n  /* ---- Motion ---- */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);  /* @kind other */\n  --dur-fast: 0.2s;   /* @kind other */\n  --dur-base: 0.3s;   /* @kind other */\n  --dur-slow: 0.6s;   /* @kind other */\n}\n\n/* ============================================================\n   HELLO GORGEOUS — BASE & HELPER STYLES\n   Brand-law contrast system, typography defaults, and the\n   button / card / section helpers used across the marketing site.\n   ============================================================ */\n\n*,\n*::before,\n*::after {\n  box-sizing: border-box;\n}\n\nbody {\n  margin: 0;\n  background: var(--surface-page);\n  color: var(--text-body);\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n::selection {\n  background: rgba(255, 45, 142, 0.3);\n  color: var(--hg-black);\n}\n\n/* ---- Headings: Playfair serif ---- */\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-heading);\n  margin: 0 0 0.5em;\n  color: var(--text-strong);\n}\n\nh1 { font-size: clamp(2.5rem, 6vw, 3.5rem); line-height: var(--lh-display); letter-spacing: var(--ls-display); }\nh2 { font-size: clamp(1.75rem, 4vw, 2.5rem); }\nh3 { font-size: clamp(1.25rem, 3vw, 1.75rem); font-weight: var(--fw-semibold); }\nh4 { font-size: var(--fs-h4); font-weight: var(--fw-semibold); }\n\np { margin: 0 0 1em; }\n\na { color: inherit; }\n\n/* ---- Eyebrow / kicker ---- */\n.hg-eyebrow {\n  font-family: var(--font-body);\n  font-size: var(--fs-eyebrow);\n  font-weight: var(--fw-bold);\n  text-transform: uppercase;\n  letter-spacing: var(--ls-widest);\n  color: var(--text-accent);\n}\n\n/* ============================================================\n   SECTION COLOR CONTROL\n   ============================================================ */\n.section-white { background: var(--hg-white); color: var(--hg-black); }\n.section-black { background: var(--hg-black); color: var(--hg-white); }\n.section-pink  { background: var(--hg-pink);  color: var(--hg-white); }\n.section-white *, .section-black *, .section-pink * { color: inherit; }\n.section-white .accent, .section-black .accent { color: var(--hg-pink); }\n\n/* ============================================================\n   LAYOUT HELPERS\n   ============================================================ */\n.hg-container {\n  max-width: var(--container-max);\n  margin: 0 auto;\n  padding-left: var(--section-x);\n  padding-right: var(--section-x);\n}\n.section-padding    { padding: var(--section-y) var(--section-x); }\n.section-padding-lg { padding: var(--section-y-lg) var(--section-x); }\n.section-padding-sm { padding: var(--section-y-sm) var(--section-x); }\n\n/* ============================================================\n   BUTTON SYSTEM\n   ============================================================ */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 8px;\n  min-height: 48px;\n  padding: 16px 36px;\n  border: none;\n  border-radius: var(--radius-sm);\n  font-family: var(--font-body);\n  font-weight: var(--fw-semibold);\n  font-size: var(--fs-sm);\n  cursor: pointer;\n  transition: all var(--dur-base) var(--ease-out);\n  text-decoration: none;\n}\n.btn:hover { transform: translateY(-2px); }\n\n.btn-primary { background: var(--hg-pink); color: #fff; }\n.btn-primary:hover { background: var(--hg-black); color: var(--hg-pink); box-shadow: var(--shadow-card-hover); }\n\n.btn-secondary { background: var(--hg-black); color: #fff; border: 2px solid var(--hg-black); }\n.btn-secondary:hover { background: #fff; color: var(--hg-black); box-shadow: var(--shadow-card-hover); }\n\n.btn-outline { background: transparent; color: var(--hg-black); border: 2px solid var(--hg-black); }\n.btn-outline:hover { background: var(--hg-pink); color: #fff; border-color: var(--hg-pink); }\n\n.btn-white { background: #fff; color: var(--hg-black); }\n.btn-white:hover { background: var(--hg-black); color: #fff; }\n\n/* Premium \"CTA\" variant: uppercase, wide tracking */\n.btn-cta {\n  text-transform: uppercase;\n  letter-spacing: var(--ls-widest);\n  font-size: var(--fs-xs);\n}\n\n/* Trifecta gradient button */\n.btn-gradient {\n  background: linear-gradient(to right, var(--tri-pink), var(--tri-pink-deep));\n  color: #fff;\n}\n.btn-gradient:hover { filter: brightness(1.1); }\n\n/* ============================================================\n   CARD SYSTEM\n   ============================================================ */\n.hg-card {\n  background: var(--surface-card);\n  color: var(--hg-black);\n  border: 2px solid var(--hg-black);\n  border-radius: var(--radius-lg);\n  padding: var(--card-pad);\n  transition: all var(--dur-base) var(--ease-out);\n}\n.hg-card:hover {\n  border-color: var(--hg-pink);\n  transform: translateY(-4px);\n  box-shadow: var(--shadow-card-hover);\n}\n.hg-card .accent { color: var(--hg-pink); }\n\n/* Soft card (shadow instead of hard border) */\n.hg-card-soft {\n  background: #fff;\n  border: 1px solid var(--border-hairline);\n  border-radius: var(--radius-lg);\n  padding: var(--card-pad);\n  box-shadow: var(--shadow-card);\n}\n\n/* ============================================================\n   BADGE / PILL\n   ============================================================ */\n.hg-badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  padding: 4px 10px;\n  border-radius: var(--radius-pill);\n  background: var(--hg-pink-deep);\n  color: #fff;\n  font-size: 9px;\n  font-weight: var(--fw-bold);\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n}\n\n/* ============================================================\n   DIVIDERS\n   ============================================================ */\n.divider-gradient {\n  width: 100%;\n  height: 4px;\n  background: linear-gradient(90deg, transparent, var(--hg-pink), transparent);\n}\n\n/* ============================================================\n   MOTION\n   ============================================================ */\n.fade-up { opacity: 0; transform: translateY(24px); }\n.fade-up.is-visible {\n  opacity: 1;\n  transform: translateY(0);\n  transition: opacity var(--dur-slow) var(--ease-out), transform var(--dur-slow) var(--ease-out);\n}\n@me  }};border-radius:999px;padding:2px 9px;\">{{ pc.tag }}<\u002Fdiv>\n          <div style=\"margin-top:12px;font-size:13px;color:rgba(0,0,0,.62);line-height:1.5;\">{{ pc.catList }}<\u002Fdiv>\n          <div style=\"margin-top:10px;font-family:var(--font-serif);font-size:15px;font-weight:600;\"><span style=\"color:{{ pc.color }};\">{{ pc.count }}<\u002Fspan> products<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:sticky;top:0;z-index:20;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.1);margin-top:20px;\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:14px 24px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;\">\n      <div style=\"display:flex;border:2px solid #000;border-radius:10px;overflow:hidden;\">\n        <button onclick=\"{{ setCompound }}\" style=\"{{ viewBtnA }}\">Compare by compound<\u002Fbutton>\n        <button onclick=\"{{ setPharmacy }}\" style=\"{{ viewBtnB }}\">Browse by pharmacy<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;border:2px solid #000;border-radius:10px;overflow:hidden;\">\n        <span style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;padding:0 10px;color:rgba(0,0,0,.55);\">Supply<\u002Fspan>\n        <button onclick=\"{{ set30 }}\" style=\"{{ supBtnA }}\">30-day<\u002Fbutton>\n        <button onclick=\"{{ set90 }}\" style=\"{{ supBtnB }}\">90-day<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"position:relative;flex:1;min-width:200px;\">\n        <input value=\"{{ query }}\" oninput=\"{{ onSearch }}\" placeholder=\"Search compound, strength, SKU…\" style=\"width:100%;border:2px solid #000;border-radius:10px;padding:9px 14px;font-size:14px;font-family:var(--font-sans);outline:none;\" style-focus=\"box-shadow:0 0 0 3px rgba(255,45,142,.18);\">\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:rgba(0,0,0,.6);border:1px dashed rgba(0,0,0,.25);border-radius:999px;padding:6px 12px;white-space:nowrap;\">Retail = cost ×{{ markupStr }} · client pays {{ shippingStr }} ship<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hg-scroll\" style=\"max-width:1240px;margin:0 auto;padding:0 24px 14px;display:flex;gap:8px;overflow-x:auto;\">\n      <sc-for list=\"{{ categories }}\" as=\"cat\" hint-placeholder-count=\"7\">\n        <button onclick=\"{{ cat.onClick }}\" style=\"{{ cat.style }}\">{{ cat.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1240px;margin:0 auto;padding:22px 24px 60px;\">\n\n    <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"text-align:center;padding:80px 0;color:rgba(0,0,0,.4);font-size:15px;\">Loading catalog…<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isCompound }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <sc-for list=\"{{ groups }}\" as=\"g\" hint-placeholder-count=\"6\">\n          <div style=\"border:2px solid #000;border-radius:16px;overflow:hidden;background:#fff;\">\n            <div onclick=\"{{ g.toggle }}\" style=\"padding:16px 18px;cursor:pointer;\">\n              <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:14px;\">\n                <div style=\"min-width:0;\">\n                  <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;\">\n                    <span style=\"font-family:var(--font-serif);font-size:21px;font-weight:700;letter-spacing:-.01em;\">{{ g.key }}<\u002Fspan>\n                    <sc-if value=\"{{ g.crossBadge }}\" hint-placeholder-val=\"{{ true }}\">\n                      <span style=\"font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:#fff;background:#FF2D8E;border-radius:999px;padding:3px 9px;white-space:nowrap;\">Cross-shop<\u002Fspan>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"font-size:12px;color:rgba(0,0,0,.5);margin-top:3px;\">{{ g.category }} · {{ g.pharmCountStr }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"font-size:12px;font-weight:700;color:#FF2D8E;white-space:nowrap;flex-shrink:0;\">{{ g.expandLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;\">\n                <sc-for list=\"{{ g.pharmRows }}\" as=\"pr\" hint-placeholder-count=\"2\">\n                  <div style=\"{{ pr.chipStyle }}\">\n                    <span style=\"width:8px;height:8px;border-radius:50%;background:{{ pr.color }};display:inline-block;flex-shrink:0;\"><\u002Fspan>\n                    <span style=\"font-weight:700;\">{{ pr.pharmacy }}<\u002Fspan>\n                    <span style=\"opacity:.7;\">{{ pr.fromStr }}<\u002Fspan>\n                    <sc-if value=\"{{ pr.isLowest }}\" hint-placeholder-val=\"{{ true }}\">\n                      <span style=\"font-size:9px;letter-spacing:.06em;text-transform:uppercase;font-weight:800;color:#fff;background:#16a34a;border-radius:999px;padding:2px 6px;\">Low<\u002Fspan>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ g.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"border-top:2px solid #000;\">\n                <sc-for list=\"{{ g.skuRows }}\" as=\"r\" hint-placeholder-count=\"3\">\n                  <div style=\"display:grid;grid-template-columns:1fr auto;gap:14px;padding:13px 18px;border-bottom:1px solid rgba(0,0,0,.08);align-items:center;background:{{ r.rowBg }};\">\n                    <div style=\"min-width:0;\">\n                      <div style=\"display:flex;align-items:center;gap:9px;flex-wrap:wrap;\">\n                        <span style=\"font-size:10px;letter-spacing:.05em;text-transform:uppercase;font-weight:800;color:{{ r.color }};border:1.5px solid {{ r.color }};border-radius:6px;padding:1px 7px;\">{{ r.pharmacy }}<\u002Fspan>\n                        <span style=\"font-weight:600;font-size:14px;\">{{ r.name }}<\u002Fspan>\n                        <sc-if value=\"{{ r.isBest }}\" hint-placeholder-val=\"{{ false }}\">\n                          <span style=\"font-size:9px;letter-spacing:.06em;text-transform:uppercase;font-weight:800;color:#fff;background:#16a34a;border-radius:999px;padding:2px 7px;\">Cheapest<\u002Fspan>\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n                      <div style=\"font-size:12px;color:rgba(0,0,0,.55);margin-top:3px;\">{{ r.detail }}<\u002Fdiv>\n                      <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;\">\n                        <sc-for list=\"{{ r.flags }}\" as=\"f\" hint-placeholder-count=\"0\">\n                          <span style=\"{{ f.style }}\">{{ f.t }}<\u002Fspan>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"display:flex;gap:16px;text-align:right;\">\n                      <div><div style=\"font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:rgba(0,0,0,.45);font-weight:700;\">Cost<\u002Fdiv><div style=\"font-family:var(--font-serif);font-size:16px;font-weight:700;\">{{ r.costStr }}<\u002Fdiv><\u002Fdiv>\n                      <div><div style=\"font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:rgba(0,0,0,.45);font-weight:700;\">Client<\u002Fdiv><div style=\"font-family:var(--font-serif);font-size:16px;font-weight:700;color:#FF2D8E;\">{{ r.retailStr }}<\u002Fdiv><\u002Fdiv>\n                      <div><div style=\"font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:rgba(0,0,0,.45);font-weight:700;\">Margin<\u002Fdiv><div style=\"font-family:var(--font-serif);font-size:16px;font-weight:700;color:#16a34a;\">{{ r.marginStr }}<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isPharmacy }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:22px;\">\n        <sc-for list=\"{{ pharmacyGroups }}\" as=\"pg\" hint-placeholder-count=\"3\">\n          <div>\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px;\">\n              <span style=\"width:13px;height:13px;border-radius:50%;background:{{ pg.color }};display:inline-block;\"><\u002Fspan>\n              <span style=\"font-family:var(--font-serif);font-size:24px;font-weight:700;\">{{ pg.pharmacy }}<\u002Fspan>\n              <span style=\"font-size:12px;color:rgba(0,0,0,.5);\">{{ pg.countStr }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"border:2px solid #000;border-radius:16px;overflow:hidden;\">\n              <sc-for list=\"{{ pg.skuRows }}\" as=\"r\" hint-placeholder-count=\"5\">\n                <div style=\"display:grid;grid-template-columns:1fr auto;gap:14px;padding:13px 18px;border-bottom:1px solid rgba(0,0,0,.08);align-items:center;\">\n                  <div style=\"min-width:0;\">\n                    <div style=\"display:flex;align-items:center;gap:9px;flex-wrap:wrap;\">\n                      <span style=\"font-weight:600;font-size:14px;\">{{ r.name }}<\u002Fspan>\n                      <span style=\"font-size:11px;color:{{ pg.color }};font-weight:700;\">{{ r.catTag }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:12px;color:rgba(0,0,0,.55);margin-top:3px;\">{{ r.detail }}<\u002Fdiv>\n                    <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;\">\n                      <sc-for list=\"{{ r.flags }}\" as=\"f\" hint-placeholder-count=\"0\">\n                        <span style=\"{{ f.style }}\">{{ f.t }}<\u002Fspan>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:16px;text-align:right;\">\n                    <div><div style=\"font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:rgba(0,0,0,.45);font-weight:700;\">Cost<\u002Fdiv><div style=\"font-family:var(--font-serif);font-size:16px;font-weight:700;\">{{ r.costStr }}<\u002Fdiv><\u002Fdiv>\n                    <div><div style=\"font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:rgba(0,0,0,.45);font-weight:700;\">Client<\u002Fdiv><div style=\"font-family:var(--font-serif);font-size:16px;font-weight:700;color:#FF2D8E;\">{{ r.retailStr }}<\u002Fdiv><\u002Fdiv>\n                    <div><div style=\"font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:rgba(0,0,0,.45);font-weight:700;\">Margin<\u002Fdiv><div style=\"font-family:var(--font-serif);font-size:16px;font-weight:700;color:#16a34a;\">{{ r.marginStr }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ empty }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center;padding:70px 0;color:rgba(0,0,0,.4);font-size:15px;\">No products match “{{ query }}”. Try a different search or category.<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"margin-top:30px;font-size:12px;color:rgba(0,0,0,.45);line-height:1.6;border-top:1px solid rgba(0,0,0,.1);padding-top:16px;\">\n      <strong style=\"color:rgba(0,0,0,.65);\">Cost<\u002Fstrong> = your pharmacy price. <strong style=\"color:rgba(0,0,0,.65);\">Client<\u002Fstrong> = cost × {{ markupStr }}. <strong style=\"color:rgba(0,0,0,.65);\">Margin<\u002Fstrong> = client − cost. Client also pays a flat {{ shippingStr }} shipping (not in margin). 90-day = 3 × the 30-day vial quantity — adjust to your dosing protocol. Formulation&nbsp;Rx pricing is from your portal; Olympia from the 2025 professional list; BoomRx from the supplied sheet. ⚠ Controlled and ❄ Cold-ship flags carried from Formulation&nbsp;Rx. Verify current pricing before ordering.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},&quot;markup&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:2.5,&quot;min&quot;:1,&quot;max&quot;:5,&quot;step&quot;:0.1,&quot;unit&quot;:&quot;×&quot;,&quot;section&quot;:&quot;Pricing&quot;,&quot;tsType&quot;:&quot;number&quot;},&quot;shipping&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:30,&quot;min&quot;:0,&quot;max&quot;:100,&quot;step&quot;:5,&quot;unit&quot;:&quot;$&quot;,&quot;section&quot;:&quot;Pricing&quot;,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  state = { data:null, view:'compound', category:'All', query:'', supply:'30', expanded:{} };\n\n  componentDidMount(){\n    this.setState({data:(window.PHARMACY_DATA||[])});\n  }\n  toggle(k){ this.setState(s=>({expanded:{...s.expanded,[k]:!s.expanded[k]}})); }\n\n  ck(name){\n    const l=name.toLowerCase();\n    if(l.includes('semaglutide')) return 'Semaglutide';\n    if(l.includes('tirzepatide')) return 'Tirzepatide';\n    if(/^nad[+ (]/.test(l)) return 'NAD+';\n    if(l.startsWith('nandrolone')) return 'Nandrolone';\n    if(l.startsWith('pt-141')) return 'PT-141';\n    if(l.includes('ss-31')||l.includes('elamipiretide')) return 'SS-31';\n    if(l.includes('sermorelin')) return 'Sermorelin';\n    if(l.startsWith('tesamorelin')&&!l.includes('/')) return 'Tesamorelin';\n    if(l.includes('pentadeca')) return 'Pentadeca Arginate';\n    if(l.includes('thymosin beta')) return 'Thymosin Beta-4';\n    if(l.includes('testosterone cypionate')&&!l.includes('propionate')&&!l.includes('anastrozole')) return 'Testosterone Cypionate';\n    if(l.includes('testosterone cypionate')&&l.includes('anastrozole')) return 'Test Cyp / Anastrozole';\n    if(l.includes('testosterone cypionate')&&l.includes('propionate')) return 'Test Cyp / Propionate';\n    if(l.startsWith('testosterone propionate')) return 'Testosterone Propionate';\n    if(l.startsWith('testosterone cream')) return 'Testosterone Cream';\n    if(l.startsWith('progesterone')) return 'Progesterone';\n    if(l.startsWith('minoxidil')) return 'Minoxidil';\n    if(l.startsWith('ivermectin')) return 'Ivermectin';\n    if(l.startsWith('larazotide')) return 'Larazotide';\n    if(l.startsWith('naltrexone')) return 'Naltrexone (LDN)';\n    return name;\n  }\n\n  renderVals(){\n    const money = n => '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});\n    const markup = Number(this.props.markup ?? 2.5);\n    const shipping = Number(this.props.shipping ?? 30);\n    const mult = this.state.supply==='90' ? 3 : 1;\n    const markupStr = (Math.round(markup*100)/100).toString();\n    const shippingStr = '$'+shipping;\n\n    const PM = {\n      'Formulation Rx':{color:'#db2777', bg:'#fdf2f8', tag:'Primary vendor'},\n      'Olympia':{color:'#2563eb', bg:'#eff6ff', tag:'Wellness & vitamins'},\n      'BoomRx':{color:'#d97706', bg:'#fffbeb', tag:'Peptide therapy'},\n    };\n    const order = ['Formulation Rx','BoomRx','Olympia'];\n\n    const flagStyle = (kind) => kind==='C'\n      ? 'font-size:10px;font-weight:700;color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:2px 7px;'\n      : 'font-size:10px;font-weight:700;color:#1d4ed8;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:2px 7px;';\n    const mkFlags = it => {\n      const f=[];\n      if(it.controlled) f.push({t:'⚠ Controlled', style:flagStyle('C')});\n      if(it.coldShip) f.push({t:'❄ Cold ship', style:flagStyle('X')});\n      return f;\n    };\n    const detailOf = it => {\n      const parts=[it.conc, it.size, it.route].filter(Boolean);\n      let s = parts.join('  ·  ');\n      if(it.sku) s += '  ·  SKU '+it.sku;\n      if(it.budDays) s += '  ·  '+it.budDays+'-day BUD';\n      return s;\n    };\n\n    const chip = (label,active) => 'cursor:pointer;white-space:nowrap;font-size:13px;font-weight:600;font-family:var(--font-sans);padding:7px 14px;border-radius:999px;border:2px solid '+(active?'#000':'rgba(0,0,0,.18)')+';background:'+(active?'#000':'#fff')+';color:'+(active?'#fff':'rgba(0,0,0,.7)')+';';\n    const seg = (active) => 'cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font-sans);padding:9px 15px;border:none;background:'+(active?'#FF2D8E':'#fff')+';color:'+(active?'#fff':'#000')+';';\n\n    const data = this.state.data;\n    const cats = ['All','GLP-1 / Weight Loss','Hormone Therapy','Peptide Therapy','Wellness','Vitamin Injections','Hair Loss','Sexual Health'];\n    const categories = cats.map(c=>({label:c, style:chip(c, c===this.state.category), onClick:()=>this.setState({category:c})}));\n\n    const base = {\n      markupStr, shippingStr, query:this.state.query,\n      categories,\n      setCompound:()=>this.setState({view:'compound'}),\n      setPharmacy:()=>this.setState({view:'pharmacy'}),\n      set30:()=>this.setState({supply:'30'}),\n      set90:()=>this.setState({supply:'90'}),\n      onSearch:(e)=>this.setState({query:e.target.value}),\n      viewBtnA:seg(this.state.view==='compound'), viewBtnB:seg(this.state.view==='pharmacy'),\n      supBtnA:seg(this.state.supply==='30'), supBtnB:seg(this.state.supply==='90'),\n      isCompound:false, isPharmacy:false, empty:false, loading:true,\n      stats:{skus:'—',compounds:'—',cross:'—'},\n      pharmacyCards:[], groups:[], pharmacyGroups:[],\n    };\n    if(!data) return base;\n\n    // pharmacy summary cards\n    const pharmacyCards = order.map(p=>{\n      const items = data.filter(d=>d.pharmacy===p);\n      const cl = [...new Set(items.map(i=>i.category))];\n      const clShort = cl.map(c=>c.replace(' / Weight Loss','').replace(' Injections',' Inj.')).join(' · ');\n      return {name:p, color:PM[p].color, bg:PM[p].bg, tag:PM[p].tag, count:items.length, catList:clShort};\n    });\n\n    const allKeys = new Set(data.map(d=>this.ck(d.name)));\n    const crossKeys = [...allKeys].filter(k=>{\n      const ph = new Set(data.filter(d=>this.ck(d.name)===k).map(d=>d.pharmacy));\n      return ph.size>1;\n    });\n    const stats = {skus:data.length, compounds:allKeys.size, cross:crossKeys.length};\n\n    // filter\n    const q = this.state.query.trim().toLowerCase();\n    const filtered = data.filter(d=>{\n      if(this.state.category!=='All' && d.category!==this.state.category) return false;\n      if(!q) return true;\n      return (d.name+' '+(d.conc||'')+' '+(d.size||'')+' '+(d.sku||'')+' '+this.ck(d.name)+' '+d.category).toLowerCase().includes(q);\n    });\n\n    Object.assign(base,{loading:false, stats, pharmacyCards,\n      isCompound:this.state.view==='compound', isPharmacy:this.state.view==='pharmacy'});\n\n    if(filtered.length===0){ base.empty=true; base.isCompound=false; base.isPharmacy=false; return base; }\n\n    if(this.state.view==='compound'){\n      const gmap={};\n      filtered.forEach(it=>{ const k=this.ck(it.name); (gmap[k]=gmap[k]||[]).push(it); });\n      const groups = Object.keys(gmap).map(key=>{\n        const items=gmap[key];\n        const phSet=[...new Set(items.map(i=>i.pharmacy))];\n        const cross=phSet.length>1;\n        const pharmRows = order.filter(p=>phSet.includes(p)).map(p=>{\n          const pit=items.filter(i=>i.pharmacy===p);\n          const costs=pit.map(i=>i.cost*mult);\n          const minC=Math.min(...costs);\n          return {pharmacy:p, color:PM[p].color, count:pit.length, minC,\n            fromStr:'from '+money(minC),\n            chipStyle:'display:inline-flex;align-items:center;gap:6px;font-size:12px;white-space:nowrap;background:'+PM[p].bg+';border:1px solid '+PM[p].color+';border-radius:999px;padding:5px 11px;color:rgba(0,0,0,.8);'};\n        });\n        const gMinPh=Math.min(...pharmRows.map(r=>r.minC));\n        pharmRows.forEach(r=>{ r.isLowest = cross && r.minC===gMinPh; });\n        const globalMin=Math.min(...items.map(i=>i.cost*mult));\n        const skuRows = items.slice().sort((a,b)=>a.cost-b.cost).map(it=>{\n          const c=it.cost*mult, ret=c*markup, mar=ret-c;\n          return {pharmacy:it.pharmacy, color:PM[it.pharmacy].color,\n            name:it.name, detail:detailOf(it),\n            costStr:money(c), retailStr:money(ret), marginStr:money(mar),\n            isBest: cross && (c===globalMin),\n            rowBg: (cross && c===globalMin) ? '#f0fdf4' : '#fff',\n            flags:mkFlags(it)};\n        });\n        return {key, category:items[0].category, crossBadge:cross, pharmCount:phSet.length,\n          pharmCountStr: cross ? (phSet.length+' pharmacies') : ('Only at '+phSet[0]),\n          pharmRows, skuRows, expanded:!!this.state.expanded[key],\n          expandLabel: this.state.expanded[key] ? '▲ Hide' : ('▾ '+items.length+' SKU'+(items.length>1?'s':'')),\n          toggle:()=>this.toggle(key)};\n      });\n      groups.sort((a,b)=> (b.crossBadge-a.crossBadge) || (b.pharmCount-a.pharmCount) || (b.skuRows.length-a.skuRows.length) || a.key.localeCompare(b.key));\n      base.groups=groups;\n    } else {\n      const pgs = order.map(p=>{\n        const items=filtered.filter(i=>i.pharmacy===p);\n        if(items.length===0) return null;\n        const sorted=items.slice().sort((a,b)=> a.category.localeCompare(b.category) || a.name.localeCompare(b.name) || a.cost-b.cost);\n        const skuRows=sorted.map(it=>{\n          const c=it.cost*mult, ret=c*markup, mar=ret-c;\n          return {name:it.name, detail:detailOf(it), catTag:it.category,\n            costStr:money(c), retailStr:money(ret), marginStr:money(mar), flags:mkFlags(it)};\n        });\n        return {pharmacy:p, color:PM[p].color, countStr:items.length+' products', skuRows};\n      }).filter(Boolean);\n      base.pharmacyGroups=pgs;\n    }\n    return base;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
