<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none" aria-labelledby="title desc" role="img">
  <title id="title">GLP oral dissolving tablets bottle  Hello Gorgeous Med Spa</title>
  <desc id="desc">Stylized medication bottle with Hello Gorgeous pink branding. Decorative graphic.</desc>
  <defs>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4da6"/>
      <stop offset="50%" stop-color="#E6007E"/>
      <stop offset="100%" stop-color="#a30055"/>
    </linearGradient>
    <linearGradient id="capG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
