  <text x="140" y="228" text-anchor="middle" fill="#ffffff" font-family="system-ui, Inter, sans-serif" font-size="9" font-weight="700">Oral Dissolving Tablets</text>
  <text x="140" y="244" text-anchor="middle" fill="#ffffff" font-family="system-ui, Inter, sans-serif" font-size="7.5" font-weight="500">Compounded medication</text>
  <text x="140" y="258" text-anchor="middle" fill="#ffffff" font-family="system-ui, Inter, sans-serif" font-size="7.5" font-weight="500">Medical weight management</text>
