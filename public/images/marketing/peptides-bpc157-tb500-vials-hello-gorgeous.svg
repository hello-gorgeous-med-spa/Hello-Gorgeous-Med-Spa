    <rect x="108" y="52" width="64" height="10" rx="2" fill="url(#ppGlass)" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M92 165 L188 148 L196 290 L100 307 Z" fill="url(#ppLabelTop)" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M100 307 L196 290 L204 332 C204 352 188 368 168 368 L112 368 C92 368 76 352 76 332 L92 165 Z" fill="url(#ppLabelBot)" stroke="#1a1a1a" stroke-width="2"/>
    <text x="140" y="182" text-anchor="middle" fill="#ffffff" font-family="system-ui, Inter, sans-serif" font-size="8" font-weight="600" letter-spacing="0.15em">PEPTIDE</text>
    <text x="140" y="228" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Playfair Display', serif" font-size="22" font-weight="700">TB-500</text>
    <text x="140" y="248" text-anchor="middle" fill="#ffffff" font-family="system-ui, Inter, sans-serif" font-size="7" font-weight="600">INJECTION</text>
    <text x="140" y="318" text-anchor="middle" fill="#E6007E" font-family="system-ui, Inter, sans-serif" font-size="7" font-weight="700" letter-spacing="0.1em">HELLO GORGEOUS</text>
    <text x="140" y="352" text-anchor="middle" fill="#333333" font-family="system-ui, Inter, sans-serif" font-size="6.5" font-weight="600">RX ONLY</text>
    <path d="M88 320 Q140 335 192 320 L192 338 Q140 355 88 338 Z" fill="#E6007E" fill-opacity="0.08" filter="url(#ppSoft)"/>
