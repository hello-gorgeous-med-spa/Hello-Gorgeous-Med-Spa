<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" fill="none" aria-labelledby="title desc" role="img">
  <title id="title">NAD+ IV infusion bag  Hello Gorgeous Med Spa</title>
  <desc id="desc">Stylized IV bag graphic with Hello Gorgeous branding. Decorative graphic.</desc>
  <defs>
    <linearGradient id="ivFluid" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E6007E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Bag -->
  <path d="M80 48 L240 48 L248 56 L248 280 Q248 312 220 312 L100 312 Q72 312 72 280 L72 56 Z" fill="url(#ivFluid)" stroke="#1a1a1a" stroke-width="2.5"/>
  <path d="M72 56 L248 56" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Hang hole -->
  <path d="M152 48 L152 28 Q160 20 168 28 L168 48" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="160" cy="26" r="5" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Port -->
  <rect x="145" y="300" width="30" height="24" rx="4" fill="#e8e8e8" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="160" y1="324" x2="160" y2="360" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Label block -->
  <rect x="92" y="88" width="136" height="168" rx="6" fill="#E6007E" stroke="#1a1a1a" stroke-width="2"/>
  <text x="160" y="118" text-anchor="middle" fill="#ffffff" font-family="system-ui, Inter, sans-serif" font-size="8" font-weight="600" letter-spacing="0.2em">IV INFUSION</text>
  <text x="160" y="168" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Playfair Display', serif" font-size="40" font-weight="700">NAD+</text>
  <text x="160" y="192" text-anchor="middle" fill="#ffffff" font-family="system-ui, Inter, sans-serif" font-size="8" font-weight="500" letter-spacing="0.08em">CLINIC ADMINISTERED</text>
  <text x="160" y="228" text-anchor="middle" fill="#ffffff" font-family="system-ui, Inter, sans-serif" font-size="7" font-weight="600">HELLO GORGEOUS MED SPA</text>
  <text x="160" y="246" text-anchor="middle" fill="#ffffff" font-family="system-ui, Inter, sans-serif" font-size="6.5" opacity="0.95">OSWEGO, IL</text>
  <text x="160" y="268" text-anchor="middle" fill="#ffffff" font-family="system-ui, Inter, sans-serif" font-size="6" font-weight="600" letter-spacing="0.1em">RX · PROVIDER ORDER ONLY</text>
</svg>
